services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smtp
      POSTGRES_PASSWORD: smtp_password
      POSTGRES_DB: smtp_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smtp -d smtp_service"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "Admin@123456"
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Admin@123456", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wCseX5eaoB3f1Jk69LoV
      MINIO_ROOT_PASSWORD: lrShukwBMSJmcFvyJJPQTJyEEe9qFXtcBMGC28LN
    ports:
      - "9080:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Application Services ─────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3002:3002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  smtp:
    build:
      context: .
      dockerfile: Dockerfile
      target: smtp
    ports:
      - "2525:2525"
      - "1025:1025"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  workers:
    build:
      context: .
      dockerfile: Dockerfile
      target: workers
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://api:3002
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  miniodata:
