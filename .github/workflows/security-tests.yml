name: Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly penetration tests
    - cron: "0 3 * * 1"

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mailpocket_test
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  JWT_SECRET: ci-test-secret-min-16chars
  API_PORT: 3001
  API_HOST: 0.0.0.0
  APP_MODE: testing
  STORAGE_DRIVER: local
  API_BASE: http://localhost:3001

jobs:
  # ── API Integration Tests (isolated environment) ─────────
  integration:
    name: API Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mailpocket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Start API server
        run: pnpm dev:api &
        env:
          NODE_ENV: test

      - name: Wait for API server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 1
          done

      - name: Run API integration tests
        run: pnpm test:integration

  # ── Security Headers & Penetration Tests ─────────────────
  e2e-security:
    name: E2E Security Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mailpocket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Start API server
        run: pnpm dev:api &
        env:
          NODE_ENV: test

      - name: Wait for API server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 1
          done

      - name: Run E2E security tests
        run: pnpm test:e2e

      - name: Run penetration tests
        run: pnpm test:pentest

  # ── Load Testing ──────────────────────────────────────────
  load-test:
    name: Load Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [integration, e2e-security]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mailpocket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Start API server
        run: pnpm dev:api &
        env:
          NODE_ENV: test

      - name: Wait for API server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001/health && break
            sleep 1
          done

      - name: Run load tests
        run: pnpm test:load:report

      - name: Upload load test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: |
            load-report.json
            load-report.html
          retention-days: 30
